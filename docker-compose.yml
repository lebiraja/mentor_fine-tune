services:
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: clarity-llm
    command: >
      -m /models/llm/Qwen3-4B-Instruct-2507-Q4_K_M.gguf
      --host 0.0.0.0 --port 8080
      --ctx-size 8192
      --n-gpu-layers 999
      --jinja
    env_file: .env
    volumes:
      - ./models/llm:/models/llm:ro
    ports:
      - "127.0.0.1:2380:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - clarity
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: clarity-backend
    env_file: .env
    environment:
      - LLM_BASE_URL=http://llm:8080/v1
      - NEO4J_URI=bolt://neo4j:7687
    volumes:
      - ./models/kokoro:/app/models/kokoro:ro
      - ./models/silero:/app/models/silero:ro
      - ./models/piper-tamil:/app/models/piper-tamil:ro
      - whisper-cache:/root/.cache/huggingface
      - clarity-data:/app/data
    ports:
      - "127.0.0.1:2324:2323"  # host 2323 is taken by bedrock-proxy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2323/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    networks:
      - clarity
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: clarity-neo4j
    profiles:
      - memory
    environment:
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-clarity-memory-dev}
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-clarity-memory-dev}
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_PASSWORD}\" 'RETURN 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - clarity
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: clarity-frontend
    ports:
      - "2000:2000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:2000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - clarity
    restart: unless-stopped

networks:
  clarity:
    driver: bridge

volumes:
  clarity-data:
    driver: local
  whisper-cache:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
